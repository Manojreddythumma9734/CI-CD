collect-updated-services-list:
  image: alpine:latest
  stage: collect-updated-services-list
  when: always
  tags:
    - aws-eks
  script:
    - apk add bash --no-cache
    - /bin/bash -c 'cat updated_*.txt 2>/dev/null | sort -u > updated_services.txt || true'
    - /bin/bash -c 'echo "${CI_COMMIT_SHA}" > services_commit.txt'
    - |
      if [ -f updated_services.txt ] && [ -s updated_services.txt ]; then
        echo "TRIGGERDOWNSTREAM=true" >> downstream.env
        echo "UPDATED_SERVICES=$(tr '\n' ',' < updated_services.txt | sed 's/,$//')" >> downstream.env
        echo "SERVICES_COMMIT_SHA=${CI_COMMIT_SHA}" >> downstream.env
      else
        echo "TRIGGERDOWNSTREAM=false" >> downstream.env
      fi
    - echo "UPSTREAM_PIPELINE_URL=${CI_PIPELINE_URL}" >> downstream.env
    - echo "ENVIRONMENT=testing" >> downstream.env
  artifacts:
    reports:
      dotenv: downstream.env
    paths:
      - updated_services.txt
      - services_commit.txt
    expire_in: 1 hour
    when: always
  needs:
    - job: bot
      optional: true
    - job: config-server
      optional: true
    - job: crms-file-upload
      optional: true
    - job: crms-login
      optional: true
    - job: crms-report
      optional: true
    - job: crms-ui
      optional: true
    - job: uam-ui
      optional: true
    - job: uam-backend
      optional: true  
    - job: crms-verification
      optional: true
    - job: data-converter
      optional: true
    - job: gateway
      optional: true
    - job: hash-object-factory
      optional: true
    - job: icc
      optional: true
    - job: import-manager
      optional: true
    - job: ml
      optional: true
    - job: prime-api
      optional: true
    - job: prime360novac-ui
      optional: true
    - job: primever
      optional: true
    - job: psx-service-wrapper
      optional: true
    - job: publish
      optional: true
    - job: pull
      optional: true
    - job: ra-ml
      optional: true
    - job: request-builder
      optional: true
    - job: request-response-router
      optional: true
    - job: response-handler
      optional: true
    - job: result-push
      optional: true  
    - job: results-aggregator
      optional: true
    - job: service-registry
      optional: true
    - job: ui-mf
      optional: true

trigger-helm-charts-pipeline:
  stage: trigger-helm-charts-pipeline
  rules:
    - if: '$CI_COMMIT_BRANCH == $BRANCH'
  trigger:
    project: $HELM_PROJECT_PATH
    branch: $HELM_PROJECT_BRANCH
    strategy: depend
    forward:
      pipeline_variables: true 
  needs:
    - collect-updated-services-list