stages:
  - docker-build-and-push
  - collect-updated-services-list
  - trigger-helm-charts-pipeline

variables:
  BRANCH: "main"
  HELM_PROJECT_BRANCH: "testing"
  HELM_PROJECT_PATH: "AWS_Prime360Nova1.0C/HELM_CHARTS"
  CI_PROJECT_ID: "aws_prime360nova1.0c/helm_charts"

.docker-buildkit-template: &docker-buildkit-template
  image: docker:28.5
  stage: docker-build-and-push
  allow_failure: true
  tags:
    - aws-eks
  variables:
    DOCKER_BUILDKIT: 1
    BUILDKIT_PROGRESS: plain
    AWS_REGION: "ap-south-1"
    AWS_ACCOUNT_ID: "783764580882"
    ECR_NAMESPACE: "prime360novac"
  before_script:
    - apk add --no-cache bash aws-cli
    - |
      set -euo pipefail
      
      SERVICE_NAME="$CI_JOB_NAME"
      ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      IMAGE_TAG="${ECR_REGISTRY}/${ECR_NAMESPACE}/${SERVICE_NAME}:${CI_COMMIT_SHA}"
      
      echo "=== Environment Check at $(date -u) UTC ==="
      echo "Service: $SERVICE_NAME"
      echo "ECR Registry: $ECR_REGISTRY"
      echo "Image Tag: $IMAGE_TAG"
      echo "Docker version: $(docker --version)"
      echo "BuildKit enabled: ${DOCKER_BUILDKIT}"
    
    - |
      echo "Checking Docker daemon connectivity..."
      if ! docker info >/dev/null 2>&1; then
        echo "ERROR: Docker daemon not accessible"
        docker info || true
        exit 1
      fi
      echo "Docker daemon is ready"
    
    - |
      echo "Logging in to AWS ECR..."
      aws ecr get-login-password --region "$AWS_REGION" | \
        docker login --username AWS --password-stdin "$ECR_REGISTRY" || {
        echo "ERROR: ECR login failed"
        exit 1
      }
      echo "ECR login successful"
    
    - |
      echo "=== Build Context Verification at $(date -u) UTC ==="
      if [ ! -d "$SERVICE_NAME" ]; then
        echo "ERROR: Build context $SERVICE_NAME does not exist"
        echo "Available directories:"
        ls -la . 2>/dev/null || echo "Current directory not accessible"
        exit 1
      fi
      if [ ! -f "$SERVICE_NAME/Dockerfile" ]; then
        echo "ERROR: Dockerfile not found in $SERVICE_NAME/"
        echo "Contents of $SERVICE_NAME/:"
        ls -la "$SERVICE_NAME/" 2>/dev/null || echo "Directory not accessible"
        exit 1
      fi
      echo "Build context verified: $SERVICE_NAME"
      echo "Dockerfile found: $SERVICE_NAME/Dockerfile"

  script:
    - |
      set -euo pipefail
      
      SERVICE_NAME="$CI_JOB_NAME"
      ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      IMAGE_TAG="${ECR_REGISTRY}/${ECR_NAMESPACE}/${SERVICE_NAME}:${CI_COMMIT_SHA}"
      
      echo "=== Starting Build Process at $(date -u) UTC ==="
      echo "Building $SERVICE_NAME -> $IMAGE_TAG"
      
      cd "$SERVICE_NAME"
      
      # Build the Docker image (will fail automatically if build fails)
      echo "Building Docker image with BuildKit..."
      docker build --progress=plain --tag "${IMAGE_TAG}" . 2>&1 | tee ../build.log
      
      echo "Build completed successfully"
      
      # Push to ECR
      echo "Pushing image to ECR..."
      docker push "${IMAGE_TAG}"
      echo "Successfully pushed: ${IMAGE_TAG}"
      
      # Tag as latest
      LATEST_TAG="${ECR_REGISTRY}/${ECR_NAMESPACE}/${SERVICE_NAME}:latest"
      echo "Tagging as latest: ${LATEST_TAG}"
      docker tag "${IMAGE_TAG}" "${LATEST_TAG}"
      docker push "${LATEST_TAG}"
      
      echo "=== Build Summary at $(date -u) UTC ==="
      echo "Successfully built and pushed $SERVICE_NAME"
      echo "Images pushed:"
      echo "  - ${IMAGE_TAG}"
      echo "  - ${LATEST_TAG}"
      
      # Create artifact marker
      echo "${SERVICE_NAME}" > "../updated_${SERVICE_NAME}.txt"

  after_script:
    - cd .. 2>/dev/null || true
    - rm -f build.log 2>/dev/null || true
    - docker image prune -f --filter "until=24h" 2>/dev/null || true

  artifacts:
    paths:
      - "updated_${CI_JOB_NAME}.txt"
    expire_in: 1 hour
    when: on_success    
        
