image:
  repository: 783764580882.dkr.ecr.ap-south-1.amazonaws.com/prime360novac/bot
  tag: 3dfb9e0aad87020dbbc0f1815612746952d9e1fb
  pullPolicy: Always
terminationGracePeriodSeconds: 120
preStopHook:
  sleepSeconds: 90
container:
  name: bot
  port: 9009
resources:
  limits:
    #    cpu: 2000m
    memory: 700Mi
  requests:
    cpu: 2000m
    memory: 700Mi
env:
  - name: SPRING_CONFIG_IMPORT
    valueFrom:
      configMapKeyRef:
        name: config-eureka-cm
        key: SPRING_CONFIG_IMPORT
  - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
    valueFrom:
      configMapKeyRef:
        name: config-eureka-cm
        key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
  - name: PRIMEVER_URL
    value: "http://aceab939bc4424eb29020cbde4219214-091b8bf817364524.elb.ap-south-1.amazonaws.com:80/primever"
  - name: JAVA_OPTS
    value: "-XX:InitialRAMPercentage=80.0 -XX:MaxRAMPercentage=80.0"
volumeMounts:
  - mountPath: /app/logs
    name: efs-logs
    subPath: bot
volumes:
  - name: efs-logs
    persistentVolumeClaim:
      claimName: efs-logs-pvc
# Pod-level securityContext
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 3000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# Container-level securityContext
containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
service:
  name: bot-svc
  port: 9009
  targetPort: 9009
  protocol: TCP
nodeSelector:
  group: common
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 20
  targetMemoryUtilizationPercentage: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 1
          periodSeconds: 10
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1
          periodSeconds: 10
startupProbe:
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 20
readinessProbe:
  path: /bot/areYouInReadyState
  httpHeaders:
    - name: Accept
      value: '*/*'
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3
livenessProbe:
  path: /bot/actuator/health/liveness
  port: 9009
  periodSeconds: 30
  timeoutSeconds: 15
  failureThreshold: 1
