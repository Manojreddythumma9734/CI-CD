replicaCount: 1

namespace: prime360novac

image:
  repository: memcached
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
  # Example: 
  # - name: docker-registry

service:
  name: memcache-svc
  type: ClusterIP
  port: 11211
  targetPort: 11211

app:
  name: memcache
  containerName: memcache-container

labels:
  app: memcache

resources:
  limits:
    # cpu: 500m
    memory: 600Mi
  requests:
    cpu: 500m
    memory: 600Mi

nodeSelector:
  group: observability
# Pod-level securityContext
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 3000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# Container-level securityContext
containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
