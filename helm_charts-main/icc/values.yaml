serviceAccount:
  name: app-s3-sa
image:
  repository: 783764580882.dkr.ecr.ap-south-1.amazonaws.com/prime360novac/icc
  tag: 9db009089ac9963afb33667851f3e2c6d10a4313
  pullPolicy: Always
terminationGracePeriodSeconds: 120
preStopHook:
  sleepSeconds: 90
imagePullSecrets:
  - name: ecr-registry-secret
container:
  name: icc
  port: 2569
resources:
  limits:
    # cpu: 2000m
    memory: 4000Mi
  requests:
    cpu: 2000m
    memory: 4000Mi
env:
  - name: POD_IP
    valueFrom:
      fieldRef:
        fieldPath: status.podIP
  - name: CONFIGSERVERURL
    valueFrom:
      configMapKeyRef:
        name: config-eureka-cm
        key: CONFIGSERVERURL
  - name: EUREKASERVERURL
    valueFrom:
      configMapKeyRef:
        name: config-eureka-cm
        key: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
#  - name: JAVA_OPTS
#    value: "-XX:InitialRAMPercentage=80.0 -XX:MaxRAMPercentage=80.0"
  - name: DEPLOYMENT_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['app']
  - name: JAVA_OPTS
    value: >
      -XX:InitialRAMPercentage=80.0 -XX:MaxRAMPercentage=80.0 -Dserver.port=2569
#-javaagent:/opt/glowroot/glowroot.jar -Dglowroot.agent.id=$(DEPLOYMENT_NAME) -Dglowroot.collector.address=glowroot-central.glowroot-system.svc.cluster.local:8181

# Pod-level securityContext
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 3000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault
# Container-level securityContext
containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
efs:
  enabled: true
  mountPath: /app/logs
  subPath: icc
s3:
  enabled: true
  mounts:
    - mountPath: /app/input
      name: s3-data-files
      subPath: data-files/
service:
  name: icc-svc
  port: 2569
  targetPort: 2569
  protocol: TCP
nodeSelector:
  group: common
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 40
  #  targetMemoryUtilizationPercentage: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 10
      policies:
        - type: Pods
          value: 1
          periodSeconds: 10
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 10
startupProbe:
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 15
readinessProbe:
  path: /icc/areYouInReadyState
  httpHeaders:
    - name: Accept
      value: '*/*'
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3
livenessProbe:
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
